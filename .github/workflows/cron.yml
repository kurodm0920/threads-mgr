name: Threads Cron

on:
  schedule:
    # 5分ごと: 予約投稿の発射
    - cron: '*/5 * * * *'
    # 毎時5分: メトリクス取得
    - cron: '5 * * * *'
    # 毎日 UTC 20:00 (JST 5:00): バズ投稿自動収集
    - cron: '0 20 * * *'
    # 毎日 UTC 15:05 (JST 0:05): 日次集計
    - cron: '5 15 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which cron to trigger manually'
        required: true
        default: 'publish'
        type: choice
        options:
          - publish
          - metrics
          - inspirations
          - daily-stats
          - all

concurrency:
  group: threads-cron
  cancel-in-progress: false

jobs:
  publish:
    if: |
      github.event.schedule == '*/5 * * * *' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.target == 'publish' || github.event.inputs.target == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger /cron/publish
        run: |
          curl -fsSL --max-time 90 -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/cron/publish"
          echo ""

  metrics:
    if: |
      github.event.schedule == '5 * * * *' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.target == 'metrics' || github.event.inputs.target == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger /cron/metrics
        run: |
          curl -fsSL --max-time 90 -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/cron/metrics"
          echo ""

  inspirations:
    if: |
      github.event.schedule == '0 20 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.target == 'inspirations' || github.event.inputs.target == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger /cron/inspirations-fetch
        run: |
          curl -fsSL --max-time 90 -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/cron/inspirations-fetch"
          echo ""

  daily-stats:
    if: |
      github.event.schedule == '5 15 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.target == 'daily-stats' || github.event.inputs.target == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger /cron/daily-stats
        run: |
          curl -fsSL --max-time 90 -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/cron/daily-stats"
          echo ""
